comment: false

ignore:
  - "**/tests/**"
  - "**/test_utils.rs"
  - "**/build.rs"

coverage:
  status:
    project:
      default:
        removed_code_behavior: adjust_base
        # This disables report a success/failure. That's not helpful on `main`
        # and we get the success/failure from the patch status on PRs.
        informational: true

    patch:
      default:
        only_pulls: true
