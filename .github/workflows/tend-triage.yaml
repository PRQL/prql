# Generated by tend. Regenerate with: uvx tend init

name: tend-triage
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: >-
      github.event.issue.user.login != 'prql-bot'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}

      - uses: ./.github/actions/tend-setup

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: prql-bot
          prompt: |
            /tend-ci-runner:triage ${{ github.event.issue.number }}
