name: test-php

on:
  workflow_call:
  workflow_dispatch:

# We need consistent env vars across all workflows for the cache to work
env:
  CARGO_TERM_COLOR: always
  CLICOLOR_FORCE: 1
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v5
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.51.1
      - run: ./.github/workflows/scripts/set_version.sh
      - name: 💰 Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.version }}-${{ hashFiles('./Cargo.lock') }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: lib
          # Caching `~/.cargo/bin/` breaks the rustup `cargo`/`rustc` symlinks
          # on the new macos-15 runner image — see
          # https://github.com/Swatinem/rust-cache/issues/341.
          cache-bin: "false"
      - run: task build-php
      - run: task test-php
