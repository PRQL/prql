# Generated by tend. Regenerate with: uvx tend init

name: tend-review
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}

      - uses: ./.github/actions/tend-setup

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: prql-bot
          use_sticky_comment: true
          prompt: >-
            ${{ format('/tend-ci-runner:review {0}', github.event.pull_request.number) }}
