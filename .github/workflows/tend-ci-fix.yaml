name: tend-ci-fix
on:
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: ["main"]

jobs:
  fix-ci:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}

      - uses: ./.github/actions/tend-setup

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: prql-bot
          model: opus
          prompt: |
            /tend-ci-runner:ci-fix ${{ github.event.workflow_run.id }}
            - Run URL: ${{ github.event.workflow_run.html_url }}
            - Commit: ${{ github.event.workflow_run.head_sha }}
            - Commit message: ${{ github.event.workflow_run.head_commit.message }}
