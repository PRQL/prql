name: tend-review-runs
on:
  schedule:
    - cron: "47 7 * * *"
  workflow_dispatch:

jobs:
  review-runs:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}

      - uses: ./.github/actions/tend-setup

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.PRQL_BOT_GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: prql-bot
          model: opus
          prompt: |
            /tend-ci-runner:review-runs
