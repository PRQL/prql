name: tend-weekly
on:
  schedule:
    - cron: "17 9 * * 0"
  workflow_dispatch:

jobs:
  weekly:
    if: github.repository_owner == 'PRQL'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEND_BOT_TOKEN }}

      - uses: ./.github/actions/tend-setup

      - uses: max-sixty/tend@0.0.24
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          bot_name: prql-bot
          model: opus
          prompt: |
            /tend-ci-runner:weekly
